AWSTemplateFormatVersion: '2010-09-09'
Description: 'SRE Lab: EKS Control Plane and IAM Role'

Parameters:
  SubnetPrivate1:
    Type: String
  SubnetPrivate2:
    Type: String

Resources:
  EksClusterRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: eks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEKSClusterPolicy

  SreEksCluster:
    Type: AWS::EKS::Cluster
    Properties:
      Name: sre-compliance-cluster
      RoleArn: !GetAtt EksClusterRole.Arn
      Version: '1.29'
      ResourcesVpcConfig:
        SubnetIds:
          - !Ref SubnetPrivate1
          - !Ref SubnetPrivate2

Outputs:
  ClusterName:
    Value: !Ref SreEksCluster